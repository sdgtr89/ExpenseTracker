<a href="#" id="new-button">New</a>
<table>
<thead>
    <tr>
        <th>Date</th>
        <th>Amount</th>
    </tr>
</thead>
<tbody>
    <tr *ngFor="let expenseInfo of expenseData">
        <td>{{ expenseInfo.date | date:'shortDate' }}</td>
        <td>{{ expenseInfo.amount | number: '1.2-2' }}</td>
        <td>
            <a href="#" (click)="editRecord(this)">Edit</a>
            <a href="#" (click)="deleteRecord(this)">Delete</a>
        </td>
    </tr>
</tbody>
</table>
